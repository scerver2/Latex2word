<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown / LaTeX ⇄ Word Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Crimson+Pro:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151933;
            --bg-tertiary: #1e2340;
            --accent-primary: #00ff88;
            --accent-secondary: #ff0080;
            --accent-tertiary: #00d4ff;
            --text-primary: #e8edf5;
            --text-secondary: #9ca8c0;
            --border-color: rgba(0, 255, 136, 0.2);
            --shadow-glow: 0 0 30px rgba(0, 255, 136, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 128, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -2px;
            text-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .mode-selector {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 50px;
            padding: 8px;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow-glow);
        }

        .mode-btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 12px 30px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            color: var(--bg-primary);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
        }

        .mode-btn:hover:not(.active) {
            color: var(--accent-primary);
        }

        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-secondary);
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow-glow);
        }

        .color-picker-group label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .color-picker {
            width: 50px;
            height: 35px;
            border: 2px solid var(--accent-primary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
        }

        .color-picker:hover {
            box-shadow: 0 0 20px var(--accent-primary);
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .panel {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow-glow);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg-tertiary);
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-primary);
            letter-spacing: 0.5px;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-block;
        }

        .file-input-btn:hover {
            background: var(--accent-tertiary);
            color: var(--bg-primary);
            border-color: var(--accent-tertiary);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .icon-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        .icon-btn.delete:hover {
            background: var(--accent-secondary);
            border-color: var(--accent-secondary);
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.4);
        }

        input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        textarea {
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            min-height: 500px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 2px solid var(--bg-primary);
            border-radius: 15px;
            padding: 20px;
            font-size: 0.95rem;
            line-height: 1.8;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .preview {
            font-family: 'Crimson Pro', serif;
            width: 100%;
            min-height: 500px;
            background: #ffffff;
            color: #000000;
            border: 2px solid var(--bg-primary);
            border-radius: 15px;
            padding: 40px;
            font-size: 1rem;
            line-height: 1.8;
            overflow-y: auto;
        }

        .preview h1, .preview h2, .preview h3, .preview h4, .preview h5, .preview h6 {
            margin-top: 1.5em;
            margin-bottom: 0.7em;
            font-weight: 700;
        }

        .preview h1 { font-size: 2.2em; }
        .preview h2 { font-size: 1.8em; }
        .preview h3 { font-size: 1.5em; }
        .preview h4 { font-size: 1.3em; }
        .preview h5 { font-size: 1.1em; }
        .preview h6 { font-size: 1em; }

        .preview p {
            margin-bottom: 1em;
        }

        .preview ul, .preview ol {
            margin-left: 2em;
            margin-bottom: 1em;
        }

        .preview code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }

        .preview pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
        }

        .preview pre code {
            background: transparent;
            padding: 0;
        }

        .preview blockquote {
            border-left: 4px solid #ddd;
            padding-left: 20px;
            margin-left: 0;
            margin-bottom: 1em;
            color: #666;
        }

        .preview table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
        }

        .preview th, .preview td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .preview th {
            background: #f5f5f5;
            font-weight: 700;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            animation: fadeIn 1.2s ease-out 0.6s both;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            color: var(--bg-primary);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 255, 136, 0.5);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 20px 30px;
            border-radius: 15px;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.4);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
                color: var(--accent-tertiary);
            }
            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 1200px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .mode-selector,
            .color-picker-group {
                justify-content: center;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MD / LaTeX ⇄ DOCX</h1>
            <p class="subtitle" id="subtitle">Convertidor Markdown / LaTeX → Word i Word → Markdown</p>
        </header>

        <div class="controls">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="md-to-word">Markdown → Word</button>
                <button class="mode-btn" data-mode="word-to-md">Word → Markdown</button>
                <button class="mode-btn" data-mode="latex-to-word">LaTeX → Word</button>
            </div>

            <div class="color-picker-group">
                <label for="titleColor" id="colorLabel">Color dels títols:</label>
                <input type="color" id="titleColor" class="color-picker" value="#2c3e50">
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" data-lang="ca">Català</button>
                <button class="mode-btn" data-lang="es">Español</button>
                <button class="mode-btn" data-lang="en">English</button>
            </div>
        </div>

        <div class="workspace">
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title" id="sourceTitle">Font</h2>
                    <div class="action-buttons">
                        <button class="icon-btn" id="copyBtn" title="Copiar contingut">📋</button>
                        <button class="icon-btn delete" id="clearBtn" title="Esborrar contingut">🗑️</button>
                        <div class="file-input-wrapper">
                            <label for="fileInput" class="file-input-btn" id="uploadBtn">📁 Pujar arxiu</label>
                            <input type="file" id="fileInput" accept=".md,.docx,.tex">
                        </div>
                    </div>
                </div>
                <textarea id="inputArea" placeholder="Enganxa o escriu el teu contingut Markdown aquí...

Exemples de símbols:
- Grec: α β γ δ ε ζ η θ λ μ π σ ω Δ Σ Ω
- Subindex: H₂O CO₂ 
- Superindex: E=mc² x²
- Matemàtiques: ∞ ≤ ≥ ≠ ± × ÷
"></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title" id="previewTitle">Previsualització</h2>
                </div>
                <div class="preview" id="preview"></div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="convertBtn">
                <span id="btnText">⚡ Convertir a Word</span>
            </button>
        </div>

        <footer style="text-align: center; margin-top: 60px; padding: 30px 0; border-top: 2px solid var(--border-color); font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); font-size: 0.95rem;" id="footer">
            Creat per <span style="color: var(--accent-primary); font-weight: 700;">Salvador Cervera</span> amb <span style="color: var(--accent-secondary); font-size: 1.2rem;">❤️</span> per a la comunitat
        </footer>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Translations
        const translations = {
            ca: {
                subtitle: "Convertidor Markdown / LaTeX → Word i Word → Markdown",
                mdToWord: "Markdown → Word",
                wordToMd: "Word → Markdown",
                latexToWord: "LaTeX → Word",
                colorLabel: "Color dels títols:",
                sourceTitle: "Font",
                previewTitle: "Previsualització",
                uploadBtn: "📁 Pujar arxiu",
                convertToWord: "⚡ Convertir a Word",
                convertToMd: "⚡ Convertir a Markdown",
                convertLatexToWord: "⚡ Convertir LaTeX a Word",
                footer: 'Creat per <span style="color: var(--accent-primary); font-weight: 700;">Salvador Cervera</span> amb <span style="color: var(--accent-secondary); font-size: 1.2rem;">❤️</span> per a la comunitat<br><br><div style="display: inline-flex; align-items: center; gap: 10px; background: var(--bg-secondary); padding: 10px 20px; border-radius: 15px; border: 1px solid var(--border-color);"><span style="color: var(--accent-tertiary); font-size: 1.2rem;">👁️</span><span style="color: var(--text-secondary);" id="visitorLabel">Visites:</span><span style="color: var(--accent-primary); font-weight: 700; font-size: 1.1rem;" id="visitorCount">---</span></div>',
                placeholderMd: `Enganxa o escriu el teu contingut Markdown aquí...

Exemples de símbols:
- Grec: α β γ δ ε ζ η θ λ μ π σ ω Δ Σ Ω
- Subindex: H₂O CO₂ 
- Superindex: E=mc² x²
- Matemàtiques: ∞ ≤ ≥ ≠ ± × ÷`,
                placeholderWord: "Enganxa el contingut del Word aquí o puja un arxiu .docx...",
                placeholderLatex: `Enganxa o escriu el teu codi LaTeX aquí...

Exemple:

\\begin{document}

                notifMdLoaded: "✓ Arxiu Markdown carregat",
                notifWordLoaded: "✓ Arxiu Word carregat",
                notifLatexLoaded: "✓ Arxiu LaTeX carregat",

                notifNoContent: "✗ No hi ha contingut per convertir",
                notifWordDownloaded: "✓ Document Word descarregat!",
                notifMdDownloaded: "✓ Arxiu Markdown descarregat!",

                notifCleared: "✓ Contingut esborrat",
                notifErrorWord: "✗ Error convertint a Word: ",
                notifErrorLoading: "✗ Error carregant el Word: "
            },
            es: {
                subtitle: "Convertidor Markdown / LaTeX → Word y Word → Markdown",
                mdToWord: "Markdown → Word",
                wordToMd: "Word → Markdown",
                latexToWord: "LaTeX → Word",
                colorLabel: "Color de los títulos:",
                sourceTitle: "Fuente",
                previewTitle: "Previsualización",
                uploadBtn: "📁 Subir archivo",
                convertToWord: "⚡ Convertir a Word",
                convertToMd: "⚡ Convertir a Markdown",
                convertLatexToWord: "⚡ Convertir LaTeX a Word",
                footer: 'Creado por <span style="color: var(--accent-primary); font-weight: 700;">Salvador Cervera</span> con <span style="color: var(--accent-secondary); font-size: 1.2rem;">❤️</span> para la comunidad',
                placeholderMd: `Pega o escribe tu contenido Markdown aquí...

Ejemplos de símbolos:
- Griego: α β γ δ ε ζ η θ λ μ π σ ω Δ Σ Ω
- Subíndice: H₂O CO₂ 
- Superíndice: E=mc² x²
- Matemáticas: ∞ ≤ ≥ ≠ ± × ÷`,
                placeholderWord: "Pega el contenido del Word aquí o sube un archivo .docx...",
                placeholderLatex: `Pega o escribe tu código LaTeX aquí...

Ejemplo:
\\documentclass{article}
\\begin{document}
\\section{Título}
Texto con fórmula $E = mc^2$.

\\subsection{Subsección}
Lista:
\\begin{itemize}
  \\item Elemento 1
  \\item Elemento 2
\\end{itemize}
\\end{document}`,
                notifMdLoaded: "✓ Archivo Markdown cargado",
                notifWordLoaded: "✓ Archivo Word cargado",
                notifLatexLoaded: "✓ Archivo LaTeX cargado",
                notifWrongFormat: "✗ Formato de archivo incorrecto",
                notifNoContent: "✗ No hay contenido para convertir",
                notifWordDownloaded: "✓ Documento Word descargado!",
                notifMdDownloaded: "✓ Archivo Markdown descargado!",
                notifCopied: "✓ Contenido copiado!",
                notifCleared: "✓ Contenido borrado",
                notifErrorWord: "✗ Error convirtiendo a Word: ",
                notifErrorLoading: "✗ Error cargando el Word: "
            },
            en: {
                subtitle: "Markdown / LaTeX → Word and Word → Markdown Converter",
                mdToWord: "Markdown → Word",
                wordToMd: "Word → Markdown",
                latexToWord: "LaTeX → Word",
                colorLabel: "Title color:",
                sourceTitle: "Source",
                previewTitle: "Preview",
                uploadBtn: "📁 Upload file",
                convertToWord: "⚡ Convert to Word",
                convertToMd: "⚡ Convert to Markdown",
                convertLatexToWord: "⚡ Convert LaTeX to Word",
                footer: 'Created by <span style="color: var(--accent-primary); font-weight: 700;">Salvador Cervera</span> with <span style="color: var(--accent-secondary); font-size: 1.2rem;">❤️</span> for the community',
                placeholderMd: `Paste or write your Markdown content here...

Symbol examples:
- Greek: α β γ δ ε ζ η θ λ μ π σ ω Δ Σ Ω
- Subscript: H₂O CO₂ 
- Superscript: E=mc² x²
- Math: ∞ ≤ ≥ ≠ ± × ÷`,
                placeholderWord: "Paste the Word content here or upload a .docx file...",
                placeholderLatex: `Paste or write your LaTeX code here...

Example:
\\documentclass{article}
\\begin{document}
\\section{Title}
Text with formula $E = mc^2$.

\\subsection{Subsection}
List:
\\begin{itemize}
  \\item Item 1
  \\item Item 2
\\end{itemize}
\\end{document}`,
                notifMdLoaded: "✓ Markdown file loaded",
                notifWordLoaded: "✓ Word file loaded",
                notifLatexLoaded: "✓ LaTeX file loaded",
                notifWrongFormat: "✗ Incorrect file format",
                notifNoContent: "✗ No content to convert",
                notifWordDownloaded: "✓ Word document downloaded!",
                notifMdDownloaded: "✓ Markdown file downloaded!",
                notifCopied: "✓ Content copied!",
                notifCleared: "✓ Content cleared",
                notifErrorWord: "✗ Error converting to Word: ",
                notifErrorLoading: "✗ Error loading Word: "
            }
        };

        // State management
        let currentMode = 'md-to-word';
        let titleColor = '#2c3e50';
        let currentLang = 'ca';

        // DOM elements
        const modeButtons = document.querySelectorAll('.mode-btn[data-mode]');

        // HTML to Markdown converter
        function htmlToMarkdown(html) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            let markdown = '';
            
            function processNode(node, listLevel = 0) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.textContent;
                }
                
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return '';
                }
                
                let result = '';
                const tag = node.tagName.toLowerCase();
                
                switch(tag) {
                    case 'h1':
                        result = '# ' + node.textContent + '\n\n';
                        break;
                    case 'h2':
                        result = '## ' + node.textContent + '\n\n';
                        break;
                    case 'h3':
                        result = '### ' + node.textContent + '\n\n';
                        break;
                    case 'h4':
                        result = '#### ' + node.textContent + '\n\n';
                        break;
                    case 'h5':
                        result = '##### ' + node.textContent + '\n\n';
                        break;
                    case 'h6':
                        result = '###### ' + node.textContent + '\n\n';
                        break;
                    case 'p':
                        result = node.textContent + '\n\n';
                        break;
                    case 'strong':
                    case 'b':
                        result = '**' + node.textContent + '**';
                        break;
                    case 'em':
                    case 'i':
                        result = '*' + node.textContent + '*';
                        break;
                    case 'code':
                        result = '`' + node.textContent + '`';
                        break;
                    case 'pre':
                        result = '```\n' + node.textContent + '\n```\n\n';
                        break;
                    case 'a':
                        result = '[' + node.textContent + '](' + node.href + ')';
                        break;
                    case 'ul':
                        Array.from(node.children).forEach(li => {
                            result += '  '.repeat(listLevel) + '- ' + li.textContent + '\n';
                        });
                        result += '\n';
                        break;
                    case 'ol':
                        Array.from(node.children).forEach((li, index) => {
                            result += '  '.repeat(listLevel) + (index + 1) + '. ' + li.textContent + '\n';
                        });
                        result += '\n';
                        break;
                    case 'blockquote':
                        result = '> ' + node.textContent + '\n\n';
                        break;
                    default:
                        result = node.textContent;
                }
                
                return result;
            }
            
            Array.from(tempDiv.childNodes).forEach(node => {
                markdown += processNode(node);
            });
            
            return markdown.trim();
        }

        // ─── LaTeX Math renderer (Unicode) ──────────────────────────────────────
        function renderLatexMath(eq) {
            let r = eq;

            // \text{...} → keep the text content
            r = r.replace(/\\text\{([^}]*)\}/g, '$1');

            // \sqrt[n]{x} and \sqrt{x}
            r = r.replace(/\\sqrt\[([^\]]*)\]\{([^}]*)\}/g, (_, n, x) => `${x}<sup>1/${n}</sup>`);
            r = r.replace(/\\sqrt\{([^}]*)\}/g, '√($1)');
            r = r.replace(/\\sqrt\s+([A-Za-z0-9])/g, '√$1');

            // \frac{num}{den}  — handle nested one level
            function expandFrac(s) {
                return s.replace(/\\frac\{([^{}]*(?:\{[^{}]*\}[^{}]*)*)\}\{([^{}]*(?:\{[^{}]*\}[^{}]*)*)\}/g,
                    (_, num, den) => `(${num})/(${den})`);
            }
            r = expandFrac(expandFrac(r)); // two passes for nested fracs

            // \implies → ⟹
            r = r.replace(/\\implies/g, ' ⟹ ');
            r = r.replace(/\\iff/g, ' ⟺ ');

            // Powers ^ and subscripts _  (handle {group} and single char)
            r = r.replace(/\^\{([^}]*)\}/g, '<sup>$1</sup>');
            r = r.replace(/\^([A-Za-z0-9])/g, '<sup>$1</sup>');
            r = r.replace(/_\{([^}]*)\}/g, '<sub>$1</sub>');
            r = r.replace(/_([A-Za-z0-9])/g, '<sub>$1</sub>');

            // Greek letters
            const greek = {
                alpha:'α', beta:'β', gamma:'γ', delta:'δ', epsilon:'ε', varepsilon:'ε',
                zeta:'ζ', eta:'η', theta:'θ', vartheta:'ϑ', iota:'ι', kappa:'κ',
                lambda:'λ', mu:'μ', nu:'ν', xi:'ξ', pi:'π', varpi:'ϖ',
                rho:'ρ', varrho:'ϱ', sigma:'σ', varsigma:'ς', tau:'τ',
                upsilon:'υ', phi:'φ', varphi:'φ', chi:'χ', psi:'ψ', omega:'ω',
                Gamma:'Γ', Delta:'Δ', Theta:'Θ', Lambda:'Λ', Xi:'Ξ',
                Pi:'Π', Sigma:'Σ', Upsilon:'Υ', Phi:'Φ', Psi:'Ψ', Omega:'Ω'
            };
            for (const [cmd, sym] of Object.entries(greek)) {
                r = r.replace(new RegExp('\\\\' + cmd + '(?![a-zA-Z])', 'g'), sym);
            }

            // Math operators & symbols
            const ops = {
                cdot:'·', times:'×', div:'÷', pm:'±', mp:'∓',
                leq:'≤', geq:'≥', neq:'≠', approx:'≈', equiv:'≡', sim:'~',
                subset:'⊂', supset:'⊃', subseteq:'⊆', supseteq:'⊇',
                in:'∈', notin:'∉', cup:'∪', cap:'∩',
                infty:'∞', partial:'∂', nabla:'∇', forall:'∀', exists:'∃',
                rightarrow:'→', leftarrow:'←', Rightarrow:'⇒', Leftarrow:'⇐',
                leftrightarrow:'↔', Leftrightarrow:'⟺', to:'→',
                sum:'Σ', prod:'Π', int:'∫', oint:'∮',
                lim:'lim', sin:'sin', cos:'cos', tan:'tan', cot:'cot',
                sec:'sec', csc:'csc', arcsin:'arcsin', arccos:'arccos', arctan:'arctan',
                log:'log', ln:'ln', exp:'exp', max:'max', min:'min', sup:'sup', inf:'inf',
                det:'det', dim:'dim', ker:'ker', deg:'deg',
                ldots:'…', cdots:'⋯', vdots:'⋮', ddots:'⋱',
                langle:'⟨', rangle:'⟩', lceil:'⌈', rceil:'⌉', lfloor:'⌊', rfloor:'⌋'
            };
            for (const [cmd, sym] of Object.entries(ops)) {
                r = r.replace(new RegExp('\\\\' + cmd + '(?![a-zA-Z])', 'g'), sym);
            }

            // \left( \right) etc — just remove the \left \right qualifier
            r = r.replace(/\\(left|right)\s*([({[|)\]}])/g, '$2');
            r = r.replace(/\\(left|right)\./g, '');

            // Remove remaining unknown backslash commands (safely)
            r = r.replace(/\\[a-zA-Z]+\*?/g, '');
            // Clean up braces
            r = r.replace(/[{}]/g, '');
            return r;
        }

        // ─── LaTeX to HTML converter ─────────────────────────────────────────────
        function latexToHtml(latex) {
            let s = latex;

            // 1. Extract title/author/date from preamble before stripping it
            const titleMatch  = s.match(/\\title\{([^}]*)\}/);
            const authorMatch = s.match(/\\author\{([^}]*)\}/);
            const dateMatch   = s.match(/\\date\{([^}]*)\}/);
            let titleBlock = '';
            if (titleMatch || authorMatch) {
                if (titleMatch)  titleBlock += `<h1 style="text-align:center">${titleMatch[1]}</h1>`;
                if (authorMatch) titleBlock += `<p style="text-align:center"><em>${authorMatch[1]}</em></p>`;
                if (dateMatch)   titleBlock += `<p style="text-align:center">${dateMatch[1]}</p>`;
            }

            // 2. Strip preamble (everything up to and including \begin{document})
            s = s.replace(/[\s\S]*?\\begin\{document\}/m, '');
            s = s.replace(/\\end\{document\}[\s\S]*/g, '');

            // 3. \maketitle
            s = s.replace(/\\maketitle/g, titleBlock);

            // 4. \begin{center}…\end{center}
            s = s.replace(/\\begin\{center\}([\s\S]*?)\\end\{center\}/g,
                (_, c) => `<div style="text-align:center">${c.trim()}</div>`);

            // 5. Environments: itemize / enumerate  (BEFORE generic begin/end strip)
            function parseList(content, tag) {
                const items = content.split(/\\item\b/).filter(t => t.trim());
                return `<${tag}>` + items.map(i => {
                    // recurse: inline formatting inside items
                    return `<li>${applyInlineFormatting(i.trim())}</li>`;
                }).join('') + `</${tag}>`;
            }
            s = s.replace(/\\begin\{itemize\}([\s\S]*?)\\end\{itemize\}/g,
                (_, c) => parseList(c, 'ul'));
            s = s.replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g,
                (_, c) => parseList(c, 'ol'));

            // 6. verbatim / lstlisting
            s = s.replace(/\\begin\{(?:verbatim|lstlisting)\}([\s\S]*?)\\end\{(?:verbatim|lstlisting)\}/g,
                (_, c) => `<pre><code>${c}</code></pre>`);

            // 7. abstract / quote
            s = s.replace(/\\begin\{abstract\}([\s\S]*?)\\end\{abstract\}/g,
                (_, c) => `<blockquote><strong>Abstract:</strong><br>${c.trim()}</blockquote>`);
            s = s.replace(/\\begin\{(?:quote|quotation)\}([\s\S]*?)\\end\{(?:quote|quotation)\}/g,
                (_, c) => `<blockquote>${c.trim()}</blockquote>`);

            // 8. Remove remaining \begin{...} / \end{...}
            s = s.replace(/\\begin\{[^}]+\}/g, '');
            s = s.replace(/\\end\{[^}]+\}/g, '');

            // 9. MATH — must happen before any generic command stripping
            //    a) display math:  \[...\]
            s = s.replace(/\\\[([\s\S]*?)\\\]/g, (_, eq) =>
                renderDisplayMath(eq.trim()));

            //    b) display math bare:  [ ... ] on its own line (common in .tex without proper escaping)
            //       Match lines that start with optional whitespace then [ and end with ]
            s = s.replace(/(?:^|\n)\s*\[\s*([\s\S]*?)\s*\]\s*(?=\n|$)/gm, (_, eq) =>
                '\n' + renderDisplayMath(eq.trim()) + '\n');

            //    c) display math:  $$...$$
            s = s.replace(/\$\$([\s\S]*?)\$\$/g, (_, eq) =>
                renderDisplayMath(eq.trim()));

            //    d) inline math:  $...$
            s = s.replace(/\$([^$\n]+?)\$/g, (_, eq) => {
                const rendered = renderLatexMath(eq.trim());
                return `<span style="font-style:italic;font-family:'Times New Roman',serif;">${rendered}</span>`;
            });

            // 10. Sections
            s = s.replace(/\\section\*?\{([^}]*)\}/g,   '<h2>$1</h2>');
            s = s.replace(/\\subsection\*?\{([^}]*)\}/g, '<h3>$1</h3>');
            s = s.replace(/\\subsubsection\*?\{([^}]*)\}/g, '<h4>$1</h4>');
            s = s.replace(/\\paragraph\*?\{([^}]*)\}/g, '<h5>$1</h5>');

            // 11. Inline text formatting
            s = applyInlineFormatting(s);

            // 12. Footnotes, links
            s = s.replace(/\\footnote\{([^}]*)\}/g, '<sup title="$1">[n]</sup>');
            s = s.replace(/\\href\{([^}]+)\}\{([^}]+)\}/g, '<a href="$1">$2</a>');
            s = s.replace(/\\url\{([^}]+)\}/g,  '<a href="$1">$1</a>');

            // 13. Spacing / layout commands
            s = s.replace(/\\vspace\*?\{[^}]*\}/g, '<br>');
            s = s.replace(/\\hspace\*?\{[^}]*\}/g, '&nbsp;');
            s = s.replace(/\\noindent\b/g, '');
            s = s.replace(/\\newline\b/g, '<br>');
            s = s.replace(/\\newpage\b/g, '<hr>');
            s = s.replace(/\\hrule\b/g, '<hr>');
            s = s.replace(/\\\\(\s*)/g, '<br>');  // \\ → <br>  (AFTER math is done)

            // 14. Remove known no-output commands (with optional {arg})
            const noOutput = [
                'label','ref','pageref','cite','bibliography','bibliographystyle',
                'usepackage','documentclass','setlength','setcounter','addtocounter',
                'pagestyle','thispagestyle','clearpage','cleardoublepage',
                'tableofcontents','listoffigures','listoftables','appendix',
                'babelprovide','babelfont','setlist','geometry','fontspec',
                'documentstyle','baselineskip','linespread'
            ];
            noOutput.forEach(cmd => {
                s = s.replace(new RegExp('\\\\' + cmd + '\\*?(?:\\[[^\\]]*\\])?(?:\\{[^}]*\\})*', 'g'), '');
            });

            // 15. Remove standalone formatting switches
            const switches = [
                'centering','raggedright','raggedleft','normalfont',
                'Large','large','small','tiny','huge','Huge','normalsize',
                'bf','it','rm','sf','tt','sl','sc','bfseries','itshape',
                'upshape','mdseries','rmfamily','sffamily','ttfamily'
            ];
            switches.forEach(cmd => {
                s = s.replace(new RegExp('\\\\' + cmd + '\\b', 'g'), '');
            });

            // 16. Catch-all: remove remaining \command (but NOT \\ which we already handled,
            //     and NOT content we want to keep)
            s = s.replace(/\\[a-zA-Z]+\*?/g, ' ');

            // 17. Clean up leftover lone braces
            s = s.replace(/[{}]/g, '');

            // 18. Build paragraphs from blank lines
            const lines = s.split('\n');
            let html = '';
            let inPara = false;
            for (const line of lines) {
                const trimmed = line.trim();
                // Block-level elements should not be wrapped in <p>
                const isBlock = /^<(h[1-6]|ul|ol|li|div|blockquote|pre|hr|table)[\s>]/.test(trimmed)
                             || /^<\/(h[1-6]|ul|ol|div|blockquote|pre|table)>/.test(trimmed);
                if (trimmed === '') {
                    if (inPara) { html += '</p>\n'; inPara = false; }
                } else if (isBlock) {
                    if (inPara) { html += '</p>\n'; inPara = false; }
                    html += trimmed + '\n';
                } else {
                    if (!inPara) { html += '<p>'; inPara = true; }
                    else html += ' ';
                    html += trimmed;
                }
            }
            if (inPara) html += '</p>\n';

            // 19. Clean empty paragraphs
            html = html.replace(/<p>\s*<\/p>/g, '');

            return html;
        }

        function renderDisplayMath(eq) {
            const rendered = renderLatexMath(eq);
            return `<div style="text-align:center;margin:1em 2em;font-style:italic;`
                 + `font-family:'Times New Roman',serif;font-size:1.05em;">${rendered}</div>`;
        }

        function applyInlineFormatting(s) {
            // Handle nested \textbf / \textit with simple greedy match (2 passes for nesting)
            for (let i = 0; i < 3; i++) {
                s = s.replace(/\\textbf\{([^{}]*)\}/g,   '<strong>$1</strong>');
                s = s.replace(/\\textit\{([^{}]*)\}/g,   '<em>$1</em>');
                s = s.replace(/\\emph\{([^{}]*)\}/g,     '<em>$1</em>');
                s = s.replace(/\\underline\{([^{}]*)\}/g,'<u>$1</u>');
                s = s.replace(/\\texttt\{([^{}]*)\}/g,   '<code>$1</code>');
                s = s.replace(/\\text\{([^{}]*)\}/g,     '$1');
                s = s.replace(/\\textsc\{([^{}]*)\}/g,   '<span style="font-variant:small-caps">$1</span>');
                s = s.replace(/\{\\bf\s+([^{}]*)\}/g,    '<strong>$1</strong>');
                s = s.replace(/\{\\it\s+([^{}]*)\}/g,    '<em>$1</em>');
                s = s.replace(/\{\\em\s+([^{}]*)\}/g,    '<em>$1</em>');
            }
            return s;
        }

        // LaTeX to Word conversion
        async function convertLatexToWord() {
            try {
                const html = latexToHtml(inputArea.value);
                
                const styledHtml = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <style>
                            body {
                                font-family: 'Calibri', 'Arial', sans-serif;
                                font-size: 11pt;
                                line-height: 1.5;
                                color: #000000;
                            }
                            h1, h2, h3, h4, h5, h6 {
                                color: ${titleColor};
                                font-weight: bold;
                                margin-top: 12pt;
                                margin-bottom: 6pt;
                            }
                            h1 { font-size: 24pt; }
                            h2 { font-size: 20pt; }
                            h3 { font-size: 16pt; }
                            h4 { font-size: 14pt; }
                            p { margin: 0; margin-bottom: 8pt; }
                            ul, ol { margin-left: 20pt; margin-bottom: 8pt; }
                            li { margin-bottom: 4pt; }
                            code {
                                font-family: 'Courier New', monospace;
                                background-color: #f5f5f5;
                                padding: 2pt 4pt;
                            }
                            pre {
                                font-family: 'Courier New', monospace;
                                background-color: #f5f5f5;
                                padding: 8pt;
                                margin-bottom: 8pt;
                            }
                            blockquote {
                                border-left: 3pt solid #cccccc;
                                padding-left: 12pt;
                                margin-left: 0;
                                margin-bottom: 8pt;
                                color: #555555;
                                font-style: italic;
                            }
                            .math-inline {
                                font-style: italic;
                                font-family: 'Times New Roman', serif;
                            }
                        ${'</style>'}
                    ${'</head>'}
                    <body>
                        ${html}
                    ${'</body>'}
                    ${'</html>'}
                `;
                
                const converted = htmlDocx.asBlob(styledHtml);
                saveAs(converted, 'document_from_latex.docx');
                showNotification(translations[currentLang].notifWordDownloaded);
            } catch (error) {
                console.error('Error:', error);
                showNotification(translations[currentLang].notifErrorWord + error.message);
            }
        }

        // Initialize
        updateLanguage();
        updatePreview();
    </script>
